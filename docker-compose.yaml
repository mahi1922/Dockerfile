name: roboshop
services: 
  mongodb:
    build: ./mongodb
    image: 225834/mongodb:v1
    container_name: mongodb
  catalogue:
    build: ./catalogue
    image: 225834/catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb
  redis:
    image: redis:7
    container_name: redis
  user:
    build: ./user
    image: 225834/user:v1
    container_name: user
    environment:
      MONGO: true
      REDIS_URL: 'redis://redis:6379'
      MONGO_URL: "mongodb://mongodb:27017/users"
    depends_on:
      mongodb:
       condition: service_healthy
      redis:
       condition: service_healthy
  cart:
    build: ./cart
    image: 225834/cart:v1
    container_name: cart
    environment:
      REDIS_HOST: "redis"
      CATALOGUE_HOST: "catalogue"
      CATALOGUE_PORT: "8080"
    depends_on:
      redis:
        condition: service_healthy
      catalogue:
        condition: service_healthy
  mysql:
    build: ./mysql
    image: 225834/mysql:v1
    container_name: mysql
    environment:
      MYSQL_ROOT_PASSWORD: "RoboShop@1"
  shipping:
    build: ./shipping
    image: 225834/shipping:v1
    container_name: shipping
    environment:
      CART_ENDPOINT: "cart:8080"
      DB_HOST: mysql
    depends_on:
      - mysql
      - cart
  payments:
    build: ./payments
    image: 225834/payments:v1
    container_name: payment
    environment:
      CART_HOST: "cart"
      CART_PORT: 8080
      USER_HOST: user
      USER_PORT: 8080
      AMQP_HOST: rabbitmq
      AMQP_USER: roboshop
      AMQP_PASS: roboshop123
    depends_on:
    - cart
    - user
    - rabbitmq
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: roboshop123
  frontend:
    build: ./frontend
    image: 225834/frontend:v1
    container_name: frontend
    ports:
      - "8080:80"
    depends_on:
      - catalogue
      - user
      - cart
      - shipping
      - payments
  
networks:
  default:
    name: roboshop
    driver: bridge
    external: false
      
