name: roboshop
services: 
  mongodb:
    build: ./mongodb
    image: 225834/mongodb:v1
    container_name: mongodb
  catalogue:
    build: ./catalogue
    image: 225834/catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb
  user:
    build: ./user
    image: 225834/user:v1
    container_name: user
    environment:
      MONGO: true
      REDIS_URL: 'redis://redis:6379'
      MONGO_URL: "mongodb://mongodb:27017/users"
    depends_on:
      - mongodb
      - redis
  frontend:
    build: ./frontend
    image: 225834/frontend:v1
    container_name: frontend
    ports:
      - "8080:80"
    depends_on:
      - catalogue
networks:
  default:
    name: roboshop
    driver: bridge
    external: false
      
